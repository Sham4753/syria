<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#007A3D"><title>QR Code - سوريا الإلكترونية</title>
    <style>
        :root { --primary: #007A3D; --white: #FFFFFF; --bg: #F0F4F0; --text: #1A1A1A; --text-secondary: #6C757D; --glass-bg: rgba(255,255,255,0.75); --radius: 14px; --radius-lg: 18px; --font: 'Segoe UI', 'Noto Sans Arabic', Tahoma, sans-serif; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: var(--font); background: var(--bg); color: var(--text); direction: rtl; padding: 15px; max-width: 520px; margin: 0 auto; }
        a { text-decoration:none; color:inherit; }
        .glass { background: var(--glass-bg); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.5); border-radius: var(--radius); }
        .header { display: flex; align-items: center; gap: 12px; padding: 10px 0 15px; }
        .back-btn { width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; cursor: pointer; }
        .page-title { font-size: 20px; font-weight: 700; }
        .section-title { font-size: 16px; font-weight: 700; margin: 15px 0 10px 0; }
        .form-group { margin-bottom: 10px; }
        .form-group label { display: block; font-weight: 600; font-size: 13px; margin-bottom: 4px; }
        .form-group input { width: 100%; padding: 11px; border-radius: var(--radius); border: 2px solid rgba(0,0,0,0.1); font-size: 14px; outline: none; font-family: var(--font); background: var(--white); }
        .btn { padding: 12px 18px; border-radius: 20px; font-size: 14px; font-weight: 600; cursor: pointer; border: none; width: 100%; text-align: center; margin-bottom: 8px; }
        .btn-primary { background: var(--primary); color: white; }
        .qr-box { text-align: center; padding: 20px; border-radius: var(--radius-lg); margin: 15px 0; }
        .qr-box canvas { max-width: 200px; }
    </style>
</head>
<body>
    <div class="header">
        <a href="/" class="back-btn glass">←</a>
        <div class="page-title">📱 QR Code</div>
    </div>

    <div class="section-title">توليد QR Code</div>
    <div class="form-group"><label>الرابط أو النص</label><input type="text" id="qrText" value="http://127.0.0.1:5000"></div>
    <button class="btn btn-primary" onclick="generateQR()">🎫 توليد QR</button>
    <div class="qr-box glass" id="qrBox"></div>

    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>
    <script>
        function generateQR() {
            const text = document.getElementById('qrText').value.trim();
            if (!text) return alert('الرجاء إدخال نص أو رابط');
            document.getElementById('qrBox').innerHTML = '<canvas id="qrCanvas"></canvas>';
            QRCode.toCanvas(document.getElementById('qrCanvas'), text, { width: 200 });
        }
        generateQR();
    </script>
</body>
</html>
