<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#007A3D"><title>هويتي - سوريا الإلكترونية</title>
    <style>
        :root { --primary: #007A3D; --bg: #F0F4F0; --text: #1A1A1A; --radius: 14px; --font: 'Segoe UI', 'Noto Sans Arabic', Tahoma, sans-serif; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: var(--font); background: var(--bg); color: var(--text); direction: rtl; padding: 15px; max-width: 520px; margin: 0 auto; text-align: center; }
        .card { background: white; border-radius: var(--radius); padding: 30px; margin: 20px 0; box-shadow: 0 4px 16px rgba(0,0,0,0.08); }
        .avatar { width: 80px; height: 80px; border-radius: 50%; background: #E8F5E9; margin: 0 auto 15px; display: flex; align-items: center; justify-content: center; font-size: 36px; }
        h2 { margin-bottom: 5px; } p { color: #6C757D; font-size: 14px; }
        .badge { display: inline-block; padding: 8px 16px; border-radius: 20px; margin: 10px 5px; font-size: 12px; font-weight: 600; }
        .badge-active { background: #D1FAE5; color: #065F46; }
        .badge-pending { background: #FEF3C7; color: #92400E; }
    </style>
</head>
<body>
    <h3 style="margin-top:20px;">🆔 الهوية الرقمية</h3>
    <div class="card">
        <div class="avatar">👤</div>
        <h2>مستخدم سوريا الإلكترونية</h2>
        <p>ID: SYR-0001-0001</p>
        <span class="badge badge-pending">⏳ قيد التفعيل</span>
    </div>
    <p style="color:#6C757D;font-size:12px;">سيتم تفعيل الهوية الرقمية بقرار من رأس الهرم</p>
</body>
</html>
