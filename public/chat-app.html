<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#007A3D"><title>محادثات - سوريا الإلكترونية</title>
    <style>
        :root { --primary: #007A3D; --primary-light: #00B359; --white: #FFFFFF; --bg: #F0F4F0; --text: #1A1A1A; --text-secondary: #6C757D; --glass-bg: rgba(255,255,255,0.75); --radius: 14px; --font: 'Segoe UI', 'Noto Sans Arabic', Tahoma, sans-serif; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: var(--font); background: var(--bg); color: var(--text); direction: rtl; padding: 15px; max-width: 520px; margin: 0 auto; height: 100vh; display: flex; flex-direction: column; }
        a { text-decoration:none; color:inherit; }
        .glass { background: var(--glass-bg); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.5); border-radius: var(--radius); }
        .header { display: flex; align-items: center; gap: 12px; padding: 10px 0; flex-shrink: 0; }
        .back-btn { width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; cursor: pointer; }
        .page-title { font-size: 20px; font-weight: 700; }
        .messages { flex: 1; overflow-y: auto; padding: 10px 0; display: flex; flex-direction: column; gap: 8px; }
        .msg { padding: 10px 14px; border-radius: 16px; max-width: 80%; font-size: 14px; line-height: 1.5; word-break: break-word; }
        .msg.sent { background: var(--primary); color: white; align-self: flex-end; }
        .msg.received { background: #E5E7EB; align-self: flex-start; }
        .input-area { display: flex; gap: 8px; padding: 10px 0; flex-shrink: 0; }
        .input-area input { flex: 1; padding: 12px 16px; border-radius: 25px; border: 2px solid rgba(0,0,0,0.1); font-size: 14px; outline: none; font-family: var(--font); }
        .input-area button { width: 48px; height: 48px; border-radius: 50%; background: var(--primary); color: white; border: none; font-size: 20px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="header">
        <a href="/" class="back-btn glass">←</a>
        <div class="page-title">💬 المحادثات</div>
    </div>
    <div class="messages" id="messages"></div>
    <div class="input-area">
        <input type="text" id="msgInput" placeholder="اكتب رسالتك..." onkeypress="if(event.key==='Enter')send()">
        <button onclick="send()">➤</button>
    </div>

    <script>
        let messages = JSON.parse(localStorage.getItem('chatMessages') || '[]');
        const user = 'أنا';

        function render() {
            const container = document.getElementById('messages');
            if (messages.length === 0) { container.innerHTML = '<p style="text-align:center;color:var(--text-secondary);padding:30px;">لا توجد رسائل. ابدأ محادثة! 💬</p>'; return; }
            container.innerHTML = messages.map(m => `
                <div class="msg ${m.from === user ? 'sent' : 'received'}">${m.text}</div>
            `).join('');
            container.scrollTop = container.scrollHeight;
        }

        function send() {
            const input = document.getElementById('msgInput');
            const text = input.value.trim();
            if (!text) return;
            messages.push({ from: user, text, time: new Date().toLocaleString() });
            localStorage.setItem('chatMessages', JSON.stringify(messages));
            input.value = '';
            render();
            // رد تلقائي بعد ثانية
            setTimeout(() => {
                messages.push({ from: 'بوت', text: '👍 تم استلام رسالتك!', time: new Date().toLocaleString() });
                localStorage.setItem('chatMessages', JSON.stringify(messages));
                render();
            }, 1000);
        }

        render();
    </script>
</body>
</html>
