<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#007A3D">
    <title>العروض - سوريا الإلكترونية</title>
    <style>
        :root {
            --primary: #007A3D; --primary-light: #00B359; --white: #FFFFFF;
            --bg: #F0F4F0; --text: #1A1A1A; --text-secondary: #6C757D;
            --gold: #D4AF37; --red: #CE1126;
            --glass-bg: rgba(255,255,255,0.7); --glass-shadow: 0 4px 16px rgba(0,0,0,0.06);
            --shadow: 0 2px 8px rgba(0,0,0,0.06); --shadow-md: 0 4px 16px rgba(0,0,0,0.1);
            --radius: 14px; --radius-lg: 18px;
            --font: 'Segoe UI', 'Noto Sans Arabic', Tahoma, sans-serif;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: var(--font); background: var(--bg);
            color: var(--text); direction: rtl;
            padding: 15px; max-width: 500px; margin: 0 auto;
        }
        a { text-decoration:none; color:inherit; }
        .glass {
            background: var(--glass-bg); backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.5); box-shadow: var(--glass-shadow);
        }
        .header {
            display: flex; align-items: center; gap: 12px;
            padding: 10px 0 20px;
        }
        .back-btn {
            width: 40px; height: 40px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 20px; font-weight: bold; cursor: pointer;
        }
        .page-title { font-size: 22px; font-weight: 700; }
        .coupon-card {
            padding: 16px; border-radius: var(--radius-lg); margin-bottom: 12px;
            border-right: 4px solid var(--gold); transition: 0.2s;
        }
        .coupon-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); }
        .coupon-header {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 8px;
        }
        .coupon-code {
            font-size: 20px; font-weight: 800; color: var(--primary);
            letter-spacing: 2px;
        }
        .coupon-badge {
            background: var(--gold); color: white; padding: 4px 12px;
            border-radius: 15px; font-size: 12px; font-weight: 700;
        }
        .coupon-desc { font-size: 13px; color: var(--text-secondary); margin-bottom: 8px; }
        .coupon-meta { font-size: 11px; color: var(--text-secondary); }
        .coupon-cta {
            margin-top: 10px; padding: 8px 0; text-align: center;
            background: var(--primary); color: white; border-radius: 10px;
            font-size: 13px; font-weight: 600; cursor: pointer; display: block;
        }
        .empty { text-align: center; padding: 50px 20px; color: var(--text-secondary); }
    </style>
</head>
<body>

    <div class="header">
        <a href="/" class="back-btn glass">←</a>
        <div class="page-title">🎫 العروض والكوبونات</div>
    </div>

    <div id="couponsList"></div>

    <script>
        async function loadCoupons() {
            try {
                const res = await fetch('/api/coupons');
                const data = await res.json();
                const container = document.getElementById('couponsList');

                if (data.success && data.data.length > 0) {
                    container.innerHTML = data.data.map(c => `
                        <div class="coupon-card glass">
                            <div class="coupon-header">
                                <span class="coupon-code">${c.code}</span>
                                <span class="coupon-badge">${c.discount_percent}% خصم</span>
                            </div>
                            <div class="coupon-desc">${c.description_ar || 'كود خصم'}</div>
                            <div class="coupon-meta">
                                ${c.min_order > 0 ? `الحد الأدنى للطلب: ${c.min_order.toLocaleString()} ل.س · ` : ''}
                                ${c.max_discount > 0 ? `أقصى خصم: ${c.max_discount.toLocaleString()} ل.س` : ''}
                            </div>
                            <a href="/cart.html?coupon=${c.code}" class="coupon-cta">🛒 استخدم الكوبون</a>
                        </div>
                    `).join('');
                } else {
                    container.innerHTML = '<div class="empty"><p>🎫 لا توجد كوبونات حالياً</p></div>';
                }
            } catch (e) {
                document.getElementById('couponsList').innerHTML = '<div class="empty"><p>❌ خطأ في التحميل</p></div>';
            }
        }

        loadCoupons();
    </script>
</body>
</html>
