<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#007A3D"><title>إدارة المنشآت - سوريا الإلكترونية</title>
    <style>
        :root { --primary: #007A3D; --primary-light: #00B359; --white: #FFFFFF; --bg: #F0F4F0; --text: #1A1A1A; --text-secondary: #6C757D; --red: #CE1126; --gold: #D4AF37; --glass-bg: rgba(255,255,255,0.7); --glass-shadow: 0 4px 16px rgba(0,0,0,0.06); --radius: 14px; --font: 'Segoe UI', 'Noto Sans Arabic', Tahoma, sans-serif; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: var(--font); background: var(--bg); color: var(--text); direction: rtl; padding: 15px; max-width: 520px; margin: 0 auto; padding-bottom: 120px; }
        a { text-decoration:none; color:inherit; }
        .glass { background: var(--glass-bg); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.5); box-shadow: var(--glass-shadow); border-radius: var(--radius); }
        .page-title { font-size: 20px; font-weight: 700; padding: 10px 0 15px; }
        .section-title { font-size: 16px; font-weight: 700; margin: 15px 0 10px 0; }
        .form-group { margin-bottom: 10px; } .form-group label { display: block; font-weight: 600; font-size: 13px; margin-bottom: 4px; }
        .form-group input, .form-group select { width: 100%; padding: 11px; border-radius: var(--radius); border: 2px solid rgba(0,0,0,0.1); font-size: 14px; outline: none; font-family: var(--font); background: var(--white); }
        .btn { padding: 12px 18px; border-radius: 20px; font-size: 14px; font-weight: 600; cursor: pointer; border: none; width: 100%; text-align: center; margin-bottom: 8px; }
        .btn-primary { background: var(--primary); color: white; } .btn-danger { background: var(--red); color: white; width: auto; padding: 6px 12px; font-size: 11px; }
        .btn-sm { padding: 6px 10px; font-size: 11px; width: auto; border-radius: 15px; margin: 2px; border: none; cursor: pointer; }
        .list-item { display: flex; align-items: center; gap: 10px; padding: 10px; border-radius: var(--radius); margin-bottom: 6px; }
        .list-icon { width: 44px; height: 44px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; overflow: hidden; background: var(--gold); color: white; }
        .list-icon img { width: 100%; height: 100%; object-fit: cover; } .list-info { flex: 1; } .list-info h4 { font-size: 14px; font-weight: 600; } .list-info p { font-size: 11px; color: var(--text-secondary); }
        .image-upload { width: 100%; height: 120px; border-radius: var(--radius); background: #E8F5E9; display: flex; align-items: center; justify-content: center; margin-bottom: 10px; cursor: pointer; font-size: 40px; background-size: cover; background-position: center; border: 2px dashed var(--primary); }
        .msg { text-align: center; margin-top: 8px; font-weight: 600; }
    </style>
</head>
<body>
    <div class="page-title">🏪 إدارة المنشآت</div>
    <div id="content"></div>
    <script>
        const API = '/api';
        let mode = 'list', editId = null, logoUrl = '';

        function load() { if (mode === 'list') showList(); else if (mode === 'add') showForm(); }

        async function showList() {
            let html = '<button class="btn btn-primary" onclick="mode=\'add\';editId=null;logoUrl=\'\';load();">➕ إضافة منشأة</button>';
            html += '<div class="section-title">📋 المنشآت</div>';
            try {
                const res = await fetch(API + '/businesses?limit=100'); const data = await res.json();
                if (data.success && data.data && data.data.length > 0) {
                    data.data.forEach(b => {
                        html += '<div class="list-item glass"><div class="list-icon">' + (b.logo ? '<img src="' + b.logo + '">' : '🏪') + '</div><div class="list-info"><h4>' + b.name_ar + (b.is_featured ? ' ⭐' : '') + '</h4><p>' + (b.region_name || '') + ' · ' + (b.phone || '') + '</p></div>';
                        html += '<button class="btn btn-sm btn-primary" onclick="editBusiness(' + b.id + ')">✏️</button>';
                        html += '<button class="btn btn-sm btn-danger" onclick="deleteBiz(' + b.id + ')">🗑️</button></div>';
                    });
                } else { html += '<p style="text-align:center;">لا توجد منشآت</p>'; }
            } catch(e) { html += '<p style="color:red;">خطأ</p>'; }
            document.getElementById('content').innerHTML = html;
        }

        function showForm() {
            let html = '<div class="section-title">' + (editId ? '✏️ تعديل' : '➕ إضافة') + '</div>';
            html += '<div class="image-upload" id="logoBox" onclick="document.getElementById(\'logoFile\').click()" style="background-image:url(\'' + (logoUrl || '') + '\');">' + (logoUrl ? '' : '📷 شعار') + '</div>';
            html += '<input type="file" id="logoFile" accept="image/*" style="display:none;" onchange="preview()">';
            html += '<div class="form-group"><label>اسم المنشأة *</label><input type="text" id="bizName"></div>';
            html += '<div class="form-group"><label>رقم الجوال *</label><input type="tel" id="bizPhone"></div>';
            html += '<div class="form-group"><label>التصنيف</label><select id="bizCat"><option value="1">🍽️ مطاعم</option><option value="11">🏥 مشافي</option><option value="12">💊 صيدليات</option></select></div>';
            html += '<div class="form-group"><label>المحافظة</label><select id="bizRegion"><option value="1">دمشق</option><option value="2">حلب</option><option value="3">حمص</option><option value="4">اللاذقية</option></select></div>';
            html += '<button class="btn btn-primary" id="saveBtn">💾 حفظ</button>';
            html += '<div class="msg" id="msg"></div>';
            document.getElementById('content').innerHTML = html;

            document.getElementById('saveBtn').onclick = async function() {
                const name = document.getElementById('bizName').value.trim(), phone = document.getElementById('bizPhone').value.trim();
                if (!name || !phone) { document.getElementById('msg').innerHTML = '<span style="color:red;">حقول ناقصة</span>'; return; }
                let uploadedLogo = logoUrl;
                const file = document.getElementById('logoFile').files[0];
                if (file) { const fd = new FormData(); fd.append('icon', file); try { const up = await fetch(API + '/upload-icon', { method: 'POST', body: fd }); const ud = await up.json(); if (ud.success) uploadedLogo = ud.image_url; } catch(e) {} }
                const body = { name_ar: name, phone: phone, password: '123456', sub_category_id: parseInt(document.getElementById('bizCat').value), region_id: parseInt(document.getElementById('bizRegion').value), logo: uploadedLogo };
                
                const url = editId ? (API + '/businesses/' + editId) : (API + '/businesses/register');
                const method = editId ? 'PUT' : 'POST';
                try {
                    const res = await fetch(url, { method, headers: {'Content-Type': 'application/json'}, body: JSON.stringify(body) });
                    const data = await res.json();
                    document.getElementById('msg').innerHTML = data.success ? '<span style="color:green;">✅ تم الحفظ</span>' : '<span style="color:red;">❌ ' + (data.message || 'فشل') + '</span>';
                    if (data.success) setTimeout(() => { mode = 'list'; editId = null; logoUrl = ''; load(); }, 800);
                } catch(e) { document.getElementById('msg').innerHTML = '<span style="color:red;">❌ خطأ</span>'; }
            };
        }

        async function editBusiness(id) {
            const res = await fetch(API + '/businesses/' + id); const data = await res.json();
            if (!data.success) return; const b = data.data; editId = id; logoUrl = b.logo || ''; mode = 'add'; load();
            setTimeout(() => { document.getElementById('bizName').value = b.name_ar || ''; document.getElementById('bizPhone').value = b.phone || ''; document.getElementById('bizCat').value = b.sub_category_id || 1; document.getElementById('bizRegion').value = b.region_id || 1; }, 300);
        }

        async function deleteBiz(id) {
            if (!confirm('متأكد من حذف هذه المنشأة؟')) return;
            try { await fetch(API + '/businesses/' + id, { method: 'DELETE' }); alert('✅ تم الحذف'); mode = 'list'; load(); }
            catch(e) { alert('❌ خطأ'); }
        }

        function preview() { const file = document.getElementById('logoFile').files[0]; if (!file) return; const reader = new FileReader(); reader.onload = function(e) { logoUrl = e.target.result; document.getElementById('logoBox').style.backgroundImage = 'url(' + e.target.result + ')'; document.getElementById('logoBox').textContent = ''; }; reader.readAsDataURL(file); }

        load();
    </script>
</body>
</html>
