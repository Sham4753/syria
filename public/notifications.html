<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#007A3D"><title>الإشعارات - سوريا الإلكترونية</title>
    <style>
        :root { --primary: #007A3D; --white: #FFFFFF; --bg: #F0F4F0; --text: #1A1A1A; --text-secondary: #6C757D; --red: #CE1126; --gold: #D4AF37; --glass-bg: rgba(255,255,255,0.75); --radius: 14px; --font: 'Segoe UI', 'Noto Sans Arabic', Tahoma, sans-serif; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: var(--font); background: var(--bg); color: var(--text); direction: rtl; padding: 15px; max-width: 520px; margin: 0 auto; }
        a { text-decoration:none; color:inherit; }
        .glass { background: var(--glass-bg); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.5); border-radius: var(--radius); }
        .header { display: flex; align-items: center; gap: 12px; padding: 10px 0 15px; }
        .back-btn { width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; cursor: pointer; }
        .page-title { font-size: 20px; font-weight: 700; }
        .section-title { font-size: 16px; font-weight: 700; margin: 15px 0 10px 0; }
        .notif-card { padding: 14px; border-radius: var(--radius); margin-bottom: 8px; display: flex; align-items: center; gap: 12px; }
        .notif-icon { width: 44px; height: 44px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
        .notif-info { flex: 1; } .notif-info h4 { font-size: 14px; font-weight: 600; } .notif-info p { font-size: 11px; color: var(--text-secondary); }
        .notif-time { font-size: 10px; color: var(--text-secondary); }
        .btn { padding: 12px 18px; border-radius: 20px; font-size: 14px; font-weight: 600; cursor: pointer; border: none; width: 100%; text-align: center; margin-bottom: 8px; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-danger { background: var(--red); color: white; }
    </style>
</head>
<body>
    <div class="header">
        <a href="/" class="back-btn glass">←</a>
        <div class="page-title">🔔 الإشعارات</div>
    </div>

    <div class="section-title">تفعيل الإشعارات</div>
    <button class="btn btn-primary" onclick="requestPermission()">🔔 تفعيل إشعارات المتصفح</button>
    <button class="btn btn-primary" id="testNotif" onclick="sendTest()" disabled>📬 إرسال إشعار تجريبي</button>

    <div class="section-title">📋 آخر الإشعارات</div>
    <div id="notifList"></div>

    <script>
        function requestPermission() {
            if (!('Notification' in window)) { alert('❌ متصفحك لا يدعم الإشعارات'); return; }
            Notification.requestPermission().then(perm => {
                if (perm === 'granted') {
                    alert('✅ تم التفعيل');
                    document.getElementById('testNotif').disabled = false;
                } else { alert('❌ تم الرفض'); }
            });
        }

        function sendTest() {
            if (Notification.permission === 'granted') {
                new Notification('🇸🇾 سوريا الإلكترونية', { body: '🔔 هذا إشعار تجريبي!', icon: 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32"><rect width="32" height="10" fill="%23007A3D"/><rect y="11" width="32" height="10" fill="%23FFF"/><rect y="22" width="32" height="10" fill="%23000"/></svg>' });
            }
        }

        // إشعارات محاكاة
        const notifs = [
            { icon: '📦', title: 'طلب جديد', desc: 'لديك طلب جديد من مطعم الياسمين', time: 'منذ 5 دقائق', color: '#D1FAE5' },
            { icon: '⭐', title: 'تقييم جديد', desc: 'حصلت على تقييم 5 نجوم', time: 'منذ 30 دقيقة', color: '#FEF3C7' },
            { icon: '🛵', title: 'توصيل', desc: 'السائق أحمد في الطريق', time: 'منذ ساعة', color: '#DBEAFE' }
        ];
        document.getElementById('notifList').innerHTML = notifs.map(n => `
            <div class="notif-card glass"><div class="notif-icon" style="background:${n.color};">${n.icon}</div><div class="notif-info"><h4>${n.title}</h4><p>${n.desc}</p></div><div class="notif-time">${n.time}</div></div>
        `).join('');
    </script>
</body>
</html>
