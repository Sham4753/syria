<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#007A3D">
    <title>لوحة التحكم - سوريا الإلكترونية</title>
    <style>
        :root {
            --primary: #007A3D; --primary-light: #00B359; --white: #FFFFFF;
            --bg: #F0F4F0; --text: #1A1A1A; --text-secondary: #6C757D;
            --red: #CE1126; --gold: #D4AF37;
            --glass-bg: rgba(255,255,255,0.7); --glass-shadow: 0 4px 16px rgba(0,0,0,0.06);
            --radius: 14px; --radius-lg: 18px;
            --font: 'Segoe UI', 'Noto Sans Arabic', Tahoma, sans-serif;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: var(--font); background: var(--bg);
            color: var(--text); direction: rtl;
            padding: 15px; max-width: 500px; margin: 0 auto;
        }
        a { text-decoration:none; color:inherit; }
        .glass { background: var(--glass-bg); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.5); box-shadow: var(--glass-shadow); }
        .header { display: flex; align-items: center; justify-content: space-between; padding: 10px 0 15px; }
        .page-title { font-size: 20px; font-weight: 700; }
        .logout-btn { padding: 8px 16px; border-radius: 20px; font-size: 13px; font-weight: 600; background: #FEE2E2; color: var(--red); cursor: pointer; }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .card { display: flex; flex-direction: column; align-items: center; gap: 8px; padding: 20px 12px; border-radius: var(--radius-lg); cursor: pointer; transition: 0.3s; text-align: center; }
        .card:hover { transform: translateY(-4px); box-shadow: 0 8px 24px rgba(0,0,0,0.1); }
        .card-icon { font-size: 36px; }
        .card-title { font-size: 14px; font-weight: 700; }
        .section-title { font-size: 16px; font-weight: 700; margin: 0 0 10px 0; }
    </style>
</head>
<body>

    <div class="header">
        <div class="page-title">👑 لوحة التحكم</div>
        <a href="/login.html" class="logout-btn" onclick="localStorage.clear()">🚪 خروج</a>
    </div>

    <div id="content"></div>

    <script>
        const API = '/api';
        const user = JSON.parse(localStorage.getItem('user') || '{}');
        if (user.role !== 'super') { document.body.innerHTML = '<div style="text-align:center;padding:50px;"><h3>❌ غير مصرح</h3><a href="/login.html">تسجيل الدخول</a></div>'; }

        async function showMenu() {
            const res = await fetch(API + '/regions');
            const data = await res.json();
            let html = '<div class="section-title">🏛️ المحافظات (14)</div><div class="grid">';
            if (data.success) {
                data.data.forEach(r => {
                    html += `<a href="/admin-region.html?id=${r.id}" class="card glass">
                        <div class="card-icon">🏛️</div>
                        <div class="card-title">${r.name_ar}</div>
                    </a>`;
                });
            }
            html += '</div>';
            html += '<div class="section-title" style="margin-top:20px;">⚙️ أدوات التحكم</div><div class="grid">';
html += '<a href="/admin-business.html" class="card glass"><div class="card-icon">🏪</div><div class="card-title">المنشآت</div></a>';           
html += '<a href="/admin-drivers.html" class="card glass"><div class="card-icon">🛵</div><div class="card-title">الموتورات</div></a>';
html += '<a href="/admin-taxis.html" class="card glass"><div class="card-icon">🚗</div><div class="card-title">التكاسي</div></a>';
html += '<a href="/admin-tracking.html" class="card glass"><div class="card-icon">🗺️</div><div class="card-title">تتبع المركبات</div></a>';
 html += '<a href="/admin-icons.html" class="card glass"><div class="card-icon">🎨</div><div class="card-title">الأيقونات والصور</div></a>';
            html += '<a href="/admin-codes.html" class="card glass"><div class="card-icon">🎫</div><div class="card-title">الأكواد</div></a>';
            html += '<a href="/admin-settings.html" class="card glass"><div class="card-icon">⚙️</div><div class="card-title">الإعدادات</div></a>';
            html += '<a href="/admin-password.html" class="card glass"><div class="card-icon">🔐</div><div class="card-title">كلمة السر</div></a>';
            html += '</div>';
            document.getElementById('content').innerHTML = html;
        }

        showMenu();
    </script>
</body>
</html>
