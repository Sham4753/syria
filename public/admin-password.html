<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#007A3D">
    <title>الأمان وكلمة السر - سوريا الإلكترونية</title>
    <style>
        :root {
            --primary: #007A3D; --primary-light: #00B359; --white: #FFFFFF;
            --bg: #F0F4F0; --text: #1A1A1A; --text-secondary: #6C757D;
            --red: #CE1126; --gold: #D4AF37;
            --glass-bg: rgba(255,255,255,0.7); --glass-shadow: 0 4px 16px rgba(0,0,0,0.06);
            --radius: 14px; --radius-lg: 18px;
            --font: 'Segoe UI', 'Noto Sans Arabic', Tahoma, sans-serif;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: var(--font); background: var(--bg);
            color: var(--text); direction: rtl;
            padding: 15px; max-width: 500px; margin: 0 auto;
            padding-bottom: 120px;
        }
        a { text-decoration:none; color:inherit; }
        .glass { background: var(--glass-bg); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.5); box-shadow: var(--glass-shadow); }
        .page-title { font-size: 20px; font-weight: 700; padding: 10px 0 15px; }
        .section-title { font-size: 16px; font-weight: 700; margin: 15px 0 10px 0; }
        .form-group { margin-bottom: 10px; }
        .form-group label { display: block; font-weight: 600; font-size: 13px; margin-bottom: 4px; }
        .form-group input, .form-group select { width: 100%; padding: 11px; border-radius: var(--radius); border: 2px solid rgba(0,0,0,0.1); font-size: 14px; outline: none; font-family: var(--font); background: var(--white); }
        .btn { padding: 12px 18px; border-radius: 20px; font-size: 14px; font-weight: 600; cursor: pointer; border: none; width: 100%; text-align: center; margin-bottom: 8px; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-danger { background: var(--red); color: white; }
        .btn-gold { background: var(--gold); color: white; }
        .toggle-row { display: flex; align-items: center; justify-content: space-between; padding: 8px 0; font-size: 13px; }
        .toggle-row input { width: 36px; height: 20px; }
        .strength-bar { height: 6px; border-radius: 3px; margin-top: 4px; background: #ddd; }
        .strength-fill { height: 100%; border-radius: 3px; transition: 0.3s; }
        .strength-weak { background: #CE1126; width: 25%; }
        .strength-medium { background: #F59E0B; width: 50%; }
        .strength-strong { background: #F0D78C; width: 75%; }
        .strength-very { background: #007A3D; width: 100%; }
        .log-item { display: flex; justify-content: space-between; padding: 8px; font-size: 11px; border-bottom: 1px solid rgba(0,0,0,0.05); }
        .log-success { color: #065F46; }
        .log-fail { color: #991B1B; }
        .msg { text-align: center; margin-top: 10px; font-weight: 600; }
    </style>
</head>
<body>

    <div class="page-title">🔐 الأمان وكلمة السر</div>
    <div id="content"></div>

    <script>
        const user = JSON.parse(localStorage.getItem('user') || '{}');
        if (user.role !== 'super') { document.body.innerHTML = '<div style="text-align:center;padding:50px;"><h3>❌ غير مصرح</h3><a href="/login.html">تسجيل الدخول</a></div>'; }

        let logs = JSON.parse(localStorage.getItem('loginLogs') || '[]');
        function addLog(action, status) { logs.unshift({ action, status, time: new Date().toLocaleString() }); if (logs.length > 10) logs = logs.slice(0, 10); localStorage.setItem('loginLogs', JSON.stringify(logs)); }

        function load() {
            let html = '';
            html += '<div class="section-title">🔐 تغيير كلمة سر رأس الهرم</div>';
            html += '<div class="form-group"><label>كلمة السر الحالية</label><input type="password" id="oldPass" placeholder="أدخل كلمة السر الحالية"></div>';
            html += '<div class="form-group"><label>كلمة السر الجديدة</label><input type="password" id="newPass" placeholder="أدخل كلمة السر الجديدة" oninput="checkStrength()"></div>';
            html += '<div class="strength-bar"><div class="strength-fill" id="strengthBar"></div></div><p style="font-size:10px;color:var(--text-secondary);margin-bottom:8px;" id="strengthText">قوة كلمة السر</p>';
            html += '<div class="form-group"><label>تأكيد كلمة السر</label><input type="password" id="confirmPass" placeholder="أعد كتابة كلمة السر"></div>';
            html += '<button class="btn btn-primary" id="changeBtn">💾 تغيير كلمة السر</button>';
            html += '<div class="msg" id="msg1"></div>';

            html += '<div class="section-title">📧 استعادة كلمة السر</div>';
            html += '<div class="form-group"><label>البريد الإلكتروني للاستعادة</label><input type="email" id="recoveryEmail" placeholder="your@email.com"></div>';
            html += '<div class="form-group"><label>رقم الجوال للاستعادة</label><input type="tel" id="recoveryPhone" placeholder="09xxxxxxxx"></div>';
            html += '<div class="form-group"><label>سؤال الأمان</label><select id="secQuestion"><option value="">اختر سؤالاً</option><option>اسم أول مدرسة؟</option><option>اسم أفضل صديق؟</option><option>اسم أول سيارة؟</option><option>اسم الحي الذي ولدت فيه؟</option></select></div>';
            html += '<div class="form-group"><label>إجابة سؤال الأمان</label><input type="text" id="secAnswer" placeholder="الإجابة"></div>';
            html += '<button class="btn btn-primary" id="saveRecovery">💾 حفظ معلومات الاستعادة</button>';
            html += '<div class="msg" id="msg2"></div>';

            html += '<div class="section-title">🔑 تغيير كلمة سر لمستخدم آخر</div>';
            html += '<div class="form-group"><label>كود المستخدم</label><input type="text" id="userCode" placeholder="SYR-..."></div>';
            html += '<div class="form-group"><label>كلمة السر الجديدة</label><input type="password" id="userNewPass" placeholder="كلمة سر جديدة"></div>';
            html += '<button class="btn btn-gold" id="changeUserBtn">💾 تغيير كلمة سر المستخدم</button>';
            html += '<div class="msg" id="msg3"></div>';

            html += '<div class="section-title">📋 سجل آخر النشاطات</div><div id="logList"></div>';
            html += '<button class="btn btn-danger" onclick="if(confirm(\'مسح السجل؟\')){logs=[];localStorage.removeItem(\'loginLogs\');load();}">🗑️ مسح السجل</button>';

            document.getElementById('content').innerHTML = html;

            document.getElementById('changeBtn').onclick = function() {
                const old = document.getElementById('oldPass').value;
                const nw = document.getElementById('newPass').value;
                const cf = document.getElementById('confirmPass').value;
                if (!old || !nw || !cf) return showMsg('msg1', 'الرجاء ملء جميع الحقول', 'red');
                if (nw !== cf) return showMsg('msg1', 'كلمة السر غير متطابقة', 'red');
                if (nw.length < 6) return showMsg('msg1', 'كلمة السر قصيرة جداً', 'red');
                addLog('تغيير كلمة سر رأس الهرم', 'success');
                showMsg('msg1', '✅ تم تغيير كلمة السر بنجاح', 'green');
                loadLogs();
            };

            document.getElementById('saveRecovery').onclick = function() {
                showMsg('msg2', '✅ تم حفظ معلومات الاستعادة', 'green');
            };

            document.getElementById('changeUserBtn').onclick = function() {
                const code = document.getElementById('userCode').value.trim();
                const nw = document.getElementById('userNewPass').value;
                if (!code || !nw) return showMsg('msg3', 'الرجاء إدخال الكود وكلمة السر', 'red');
                addLog('تغيير كلمة سر: ' + code, 'success');
                showMsg('msg3', '✅ تم تغيير كلمة سر المستخدم', 'green');
                loadLogs();
            };

            loadLogs();
        }

        function checkStrength() {
            const pw = document.getElementById('newPass').value;
            const bar = document.getElementById('strengthBar');
            const txt = document.getElementById('strengthText');
            bar.className = 'strength-fill';
            if (pw.length === 0) { bar.className = 'strength-fill'; txt.textContent = 'قوة كلمة السر'; }
            else if (pw.length < 4) { bar.classList.add('strength-weak'); txt.textContent = 'ضعيفة'; }
            else if (pw.length < 6) { bar.classList.add('strength-medium'); txt.textContent = 'متوسطة'; }
            else if (pw.length < 8) { bar.classList.add('strength-strong'); txt.textContent = 'قوية'; }
            else { bar.classList.add('strength-very'); txt.textContent = 'قوية جداً'; }
        }

        function loadLogs() {
            const list = document.getElementById('logList');
            if (logs.length === 0) { list.innerHTML = '<p style="text-align:center;color:var(--text-secondary);">لا توجد نشاطات</p>'; return; }
            list.innerHTML = logs.map(l => '<div class="log-item"><span>' + l.action + '</span><span style="font-size:10px;color:var(--text-secondary);">' + l.time + '</span></div>').join('');
        }

        function showMsg(id, text, color) {
            document.getElementById(id).innerHTML = '<p style="color:' + color + ';">' + text + '</p>';
        }

        load();
    </script>
</body>
</html>
