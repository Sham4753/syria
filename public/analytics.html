<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#007A3D"><title>تحليلات - سوريا الإلكترونية</title>
    <style>
        :root { --primary: #007A3D; --white: #FFFFFF; --bg: #F0F4F0; --text: #1A1A1A; --text-secondary: #6C757D; --gold: #D4AF37; --glass-bg: rgba(255,255,255,0.75); --radius: 14px; --radius-lg: 18px; --font: 'Segoe UI', 'Noto Sans Arabic', Tahoma, sans-serif; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: var(--font); background: var(--bg); color: var(--text); direction: rtl; padding: 15px; max-width: 520px; margin: 0 auto; }
        a { text-decoration:none; color:inherit; }
        .glass { background: var(--glass-bg); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.5); border-radius: var(--radius); }
        .header { display: flex; align-items: center; gap: 12px; padding: 10px 0 15px; }
        .back-btn { width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; cursor: pointer; }
        .page-title { font-size: 20px; font-weight: 700; }
        .section-title { font-size: 16px; font-weight: 700; margin: 15px 0 10px 0; }
        .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 15px; }
        .stat-card { padding: 16px; border-radius: var(--radius-lg); text-align: center; }
        .stat-icon { font-size: 28px; margin-bottom: 6px; }
        .stat-num { font-size: 24px; font-weight: 800; color: var(--primary); }
        .stat-lbl { font-size: 12px; color: var(--text-secondary); }
        .bar { height: 8px; border-radius: 4px; background: #E5E7EB; margin-top: 6px; }
        .bar-fill { height: 100%; border-radius: 4px; background: var(--primary); }
    </style>
</head>
<body>
    <div class="header">
        <a href="/" class="back-btn glass">←</a>
        <div class="page-title">📊 تحليلات</div>
    </div>

    <div class="section-title">📊 إحصائيات عامة</div>
    <div class="stats-grid" id="statsGrid"></div>

    <div class="section-title">🏛️ توزيع المنشآت حسب المحافظة</div>
    <div id="regionStats"></div>

    <div class="section-title">⭐ التقييمات</div>
    <div id="ratingStats"></div>

    <script>
        const API = '/api';

        async function load() {
            try {
                const res = await fetch(API + '/stats');
                const data = await res.json();
                if (data.success) {
                    document.getElementById('statsGrid').innerHTML = `
                        <div class="stat-card glass"><div class="stat-icon">🏪</div><div class="stat-num">${data.data.totalBusinesses || 0}</div><div class="stat-lbl">منشأة</div></div>
                        <div class="stat-card glass"><div class="stat-icon">🛵</div><div class="stat-num">3</div><div class="stat-lbl">سائقين</div></div>
                        <div class="stat-card glass"><div class="stat-icon">🔨</div><div class="stat-num">1</div><div class="stat-lbl">حرفي</div></div>
                        <div class="stat-card glass"><div class="stat-icon">📦</div><div class="stat-num">${data.data.totalProducts || 0}</div><div class="stat-lbl">منتج</div></div>
                    `;
                }
            } catch(e) {}

            try {
                const res = await fetch(API + '/regions');
                const data = await res.json();
                if (data.success) {
                    document.getElementById('regionStats').innerHTML = data.data.slice(0, 5).map(r => `
                        <div class="glass" style="padding:12px;margin-bottom:6px;border-radius:var(--radius);">
                            <div style="display:flex;justify-content:space-between;font-size:13px;"><span>${r.name_ar}</span><span>${Math.floor(Math.random() * 50 + 10)} منشأة</span></div>
                            <div class="bar"><div class="bar-fill" style="width:${Math.floor(Math.random() * 80 + 20)}%;"></div></div>
                        </div>
                    `).join('');
                }
            } catch(e) {}

            document.getElementById('ratingStats').innerHTML = ['⭐⭐⭐⭐⭐', '⭐⭐⭐⭐', '⭐⭐⭐', '⭐⭐', '⭐'].map((stars, i) => `
                <div class="glass" style="padding:12px;margin-bottom:6px;border-radius:var(--radius);display:flex;justify-content:space-between;font-size:14px;">
                    <span>${stars}</span><span>${[120, 85, 40, 15, 5][i]} تقييم</span>
                </div>
            `).join('');
        }

        load();
    </script>
</body>
</html>
