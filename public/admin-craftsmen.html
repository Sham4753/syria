<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#007A3D"><title>إدارة الحرفيين - سوريا الإلكترونية</title>
    <style>
        :root { --primary: #007A3D; --primary-light: #00B359; --white: #FFFFFF; --bg: #F0F4F0; --text: #1A1A1A; --text-secondary: #6C757D; --red: #CE1126; --gold: #D4AF37; --glass-bg: rgba(255,255,255,0.7); --glass-shadow: 0 4px 16px rgba(0,0,0,0.06); --radius: 14px; --font: 'Segoe UI', 'Noto Sans Arabic', Tahoma, sans-serif; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: var(--font); background: var(--bg); color: var(--text); direction: rtl; padding: 15px; max-width: 520px; margin: 0 auto; padding-bottom: 120px; }
        a { text-decoration:none; color:inherit; }
        .glass { background: var(--glass-bg); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.5); box-shadow: var(--glass-shadow); border-radius: var(--radius); }
        .page-title { font-size: 20px; font-weight: 700; padding: 10px 0 15px; }
        .section-title { font-size: 16px; font-weight: 700; margin: 15px 0 10px 0; }
        .btn { padding: 12px 18px; border-radius: 20px; font-size: 14px; font-weight: 600; cursor: pointer; border: none; width: 100%; text-align: center; margin-bottom: 8px; }
        .btn-primary { background: var(--primary); color: white; } .btn-danger { background: var(--red); color: white; width: auto; padding: 6px 12px; font-size: 11px; }
        .btn-sm { padding: 6px 10px; font-size: 11px; width: auto; border-radius: 15px; margin: 2px; border: none; cursor: pointer; }
        .btn-gold { background: var(--gold); color: white; width: auto; padding: 6px 12px; font-size: 11px; }
        .list-item { display: flex; align-items: center; gap: 10px; padding: 10px; border-radius: var(--radius); margin-bottom: 6px; }
        .list-icon { width: 44px; height: 44px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; background: #E8F5E9; overflow: hidden; }
        .list-icon img { width: 100%; height: 100%; object-fit: cover; }
        .list-info { flex: 1; } .list-info h4 { font-size: 14px; font-weight: 600; } .list-info p { font-size: 11px; color: var(--text-secondary); }
    </style>
</head>
<body>
    <div class="page-title">🔨 إدارة الحرفيين</div>
    <div id="content"></div>
    <script>
        const API = '/api';

        async function load() {
            let html = '<div class="section-title">📋 الحرفيين</div>';
            try {
                const res = await fetch(API + '/craftsmen');
                const data = await res.json();
                if (data.success && data.data.length > 0) {
                    data.data.forEach(c => {
                        html += `<div class="list-item glass">
                            <div class="list-icon">${c.images ? '<img src="'+c.images+'">' : '👷'}</div>
                            <div class="list-info"><h4>${c.name_ar} ${c.is_verified ? '✅' : ''}</h4><p>🔨 ${c.trade} · 📞 ${c.phone} · ⭐ ${(c.average_rating||0).toFixed(1)}</p></div>
                            <button class="btn btn-sm btn-gold" onclick="verify(${c.id})">✅</button>
              
<button class="btn btn-sm btn-primary" onclick="editCraftsman(${c.id})">✏️</button>
<button class="btn btn-sm btn-danger" onclick="deleteCraftsman(${c.id})">🗑️</button>                        </div>`;
                    });
                } else { html += '<p style="text-align:center;">لا يوجد حرفيين</p>'; }
            } catch(e) { html += '<p style="color:red;">خطأ</p>'; }
            document.getElementById('content').innerHTML = html;
        }

        async function verify(id) { alert('✅ تم التوثيق (محاكاة)'); load(); }
        async function deleteCraftsman(id) {
            if (!confirm('متأكد من حذف الحرفي؟')) return;
            try { await fetch(API + '/craftsmen/' + id, { method: 'DELETE' }); alert('✅ تم الحذف'); load(); }
            catch(e) { alert('❌ خطأ'); }
        }
async function editCraftsman(id) {
    const res = await fetch(API + '/craftsmen');
    const data = await res.json();
    if (!data.success) return;
    const c = data.data.find(x => x.id === id);
    if (!c) return;
    const newPhone = prompt('رقم الجوال الجديد:', c.phone);
    const newName = prompt('الاسم الجديد:', c.name_ar);
    if (newPhone || newName) {
        try {
            await fetch(API + '/craftsmen/' + id, {
                method: 'PUT',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ name_ar: newName || c.name_ar, phone: newPhone || c.phone })
            });
            alert('✅ تم التعديل');
            load();
        } catch(e) { alert('❌ خطأ'); }
    }
}
        load();
    </script>
</body>
</html>
