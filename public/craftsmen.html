<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#007A3D">
    <title>حرفيين - سوريا الإلكترونية</title>
    <style>
        :root {
            --primary: #007A3D; --primary-light: #00B359; --white: #FFFFFF;
            --bg: #F0F4F0; --text: #1A1A1A; --text-secondary: #6C757D;
            --gold: #D4AF37;
            --glass-bg: rgba(255,255,255,0.7); --glass-shadow: 0 4px 16px rgba(0,0,0,0.06);
            --shadow-md: 0 4px 16px rgba(0,0,0,0.1);
            --radius: 14px; --radius-lg: 18px;
            --font: 'Segoe UI', 'Noto Sans Arabic', Tahoma, sans-serif;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: var(--font); background: var(--bg);
            color: var(--text); direction: rtl;
            padding: 15px; max-width: 500px; margin: 0 auto;
        }
        a { text-decoration:none; color:inherit; }
        .glass {
            background: var(--glass-bg); backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.5); box-shadow: var(--glass-shadow);
        }
        .header {
            display: flex; align-items: center; gap: 12px;
            padding: 10px 0 15px;
        }
        .back-btn {
            width: 40px; height: 40px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 20px; font-weight: bold; cursor: pointer;
        }
        .page-title { font-size: 20px; font-weight: 700; }
        .trade-grid {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px;
            margin-bottom: 15px;
        }
        .trade-chip {
            padding: 12px 8px; text-align: center; border-radius: var(--radius);
            font-size: 12px; font-weight: 600; cursor: pointer; transition: 0.2s;
        }
        .trade-chip:hover, .trade-chip.active { background: var(--primary); color: white; }
        .search-box {
            display: flex; padding: 4px; border-radius: 25px; margin-bottom: 15px;
        }
        .search-box input { flex: 1; padding: 12px; font-size: 14px; border: none; outline: none; background: transparent; }
        .search-box button {
            padding: 10px 18px; background: var(--primary); color: white;
            border: none; border-radius: 20px; font-weight: 600; cursor: pointer;
        }
        .craftsman-card {
            display: flex; align-items: center; gap: 12px;
            padding: 14px; border-radius: var(--radius); margin-bottom: 8px;
            transition: 0.2s;
        }
        .craftsman-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); }
        .craftsman-icon {
            width: 50px; height: 50px; border-radius: 50%;
            background: linear-gradient(135deg, #E8F5E9, #C8E6C9);
            display: flex; align-items: center; justify-content: center;
            font-size: 24px; flex-shrink: 0;
        }
        .craftsman-info { flex: 1; }
        .craftsman-info h4 { font-size: 14px; font-weight: 600; }
        .craftsman-info p { font-size: 11px; color: var(--text-secondary); }
        .craftsman-trade {
            display: inline-block; padding: 4px 10px; border-radius: 12px;
            font-size: 10px; font-weight: 700; background: #D1FAE5; color: var(--primary);
        }
        .call-btn {
            padding: 10px 16px; background: var(--primary); color: white;
            border-radius: 20px; font-size: 13px; font-weight: 600; cursor: pointer;
            border: none; white-space: nowrap;
        }
        .empty { text-align: center; padding: 40px; color: var(--text-secondary); }
    </style>
</head>
<body>

    <div class="header">
        <a href="/" class="back-btn glass">←</a>
        <div class="page-title">🔨 حرفيين</div>
    </div>

    <div class="trade-grid" id="tradeGrid">
        <div class="trade-chip glass active" data-trade="" onclick="filterTrade('', this)">الكل</div>
        <div class="trade-chip glass" data-trade="دهان" onclick="filterTrade('دهان', this)">🎨 دهان</div>
        <div class="trade-chip glass" data-trade="بلاط" onclick="filterTrade('بلاط', this)">🧱 بلاط</div>
        <div class="trade-chip glass" data-trade="كهربائي" onclick="filterTrade('كهربائي', this)">⚡ كهربائي</div>
        <div class="trade-chip glass" data-trade="سمكري" onclick="filterTrade('سمكري', this)">🔧 سمكري</div>
        <div class="trade-chip glass" data-trade="نجار" onclick="filterTrade('نجار', this)">🪚 نجار</div>
    </div>

    <div class="search-box glass">
        <input type="text" id="regionSearch" placeholder="ابحث عن حرفي في منطقتك...">
        <button onclick="searchCraftsmen()">🔍 بحث</button>
    </div>

    <div id="craftsmenList"></div>

    <script>
        const API = '/api';
        let currentTrade = '';

        function filterTrade(trade, el) {
            currentTrade = trade;
            document.querySelectorAll('.trade-chip').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
            loadCraftsmen();
        }

        function searchCraftsmen() { loadCraftsmen(); }

        async function loadCraftsmen() {
            const container = document.getElementById('craftsmenList');
            const region = document.getElementById('regionSearch').value.trim();
            container.innerHTML = '<div class="empty">⏳ جاري التحميل...</div>';

            try {
                let url = `${API}/craftsmen?`;
                if (currentTrade) url += `trade=${encodeURIComponent(currentTrade)}&`;
                if (region) url += `region=${encodeURIComponent(region)}`;

                const res = await fetch(url);
                const data = await res.json();

                if (data.success && data.data.length > 0) {
container.innerHTML = data.data.map(c => `
    <div class="craftsman-card glass">
        <div class="craftsman-icon" style="background:linear-gradient(135deg,#E8F5E9,#C8E6C9);font-size:28px;">${c.images ? '<img src="'+c.images+'" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">' : '👷'}</div>
        <div class="craftsman-info">
            <h4>${c.name_ar} ${c.is_verified ? '✅' : ''}</h4>
            <p>📍 ${c.regions || 'غير محدد'}</p>
            <p>⭐ ${(c.average_rating || 0).toFixed(1)} (${c.total_ratings || 0} تقييم)</p>
            <span class="craftsman-trade">${c.trade}</span>
        </div>
        <div style="display:flex;flex-direction:column;gap:6px;">
            <a href="tel:${c.phone}" class="call-btn">📞</a>
            ${c.phone2 ? '<a href="tel:'+c.phone2+'" class="call-btn" style="background:#1A1A1A;">📞2</a>' : ''}
        </div>
    </div>
`).join('');
                } else {
                    container.innerHTML = '<div class="empty"><p>🔨 لا يوجد حرفيين في هذه المنطقة حالياً</p><p style="font-size:12px;">كن أول حرفي <a href="/craftsman-register.html" style="color:var(--primary);">سجل الآن</a></p></div>';
                }
            } catch (e) {
                container.innerHTML = '<div class="empty">❌ خطأ في التحميل</div>';
            }
        }

        loadCraftsmen();
    </script>
</body>
</html>
